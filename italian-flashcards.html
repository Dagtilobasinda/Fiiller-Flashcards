<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İtalyanca Fiiller – Flashcard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sun: #F5A623;
    --terra: #C85A1E;
    --cream: #FDF8F2;
    --ink: #1A1208;
    --muted: #8C7B6B;
    --green: #2E7D52;
    --red: #C0392B;
    --card-bg: #FFFDF9;
    --shadow: 0 8px 40px rgba(26,18,8,0.13);
  }

  body {
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    color: var(--ink);
    letter-spacing: -0.5px;
  }

  header h1 span { color: var(--terra); font-style: italic; }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 460px;
    margin-bottom: 20px;
  }

  .progress-bar {
    flex: 1;
    height: 6px;
    background: #e8ddd3;
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sun), var(--terra));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .progress-text {
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
    min-width: 52px;
    text-align: right;
  }

  /* Filter tabs */
  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 99px;
    border: 1.5px solid #d4c9bc;
    background: transparent;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Inter', sans-serif;
  }

  .filter-btn:hover { border-color: var(--sun); color: var(--terra); }
  .filter-btn.active { background: var(--sun); border-color: var(--sun); color: #fff; font-weight: 600; }

  /* Card scene */
  .scene {
    width: 100%;
    max-width: 460px;
    height: 280px;
    perspective: 1000px;
    margin-bottom: 28px;
    cursor: pointer;
  }

  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 20px;
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px 28px;
    box-shadow: var(--shadow);
  }

  .card-front {
    background: var(--card-bg);
    border: 1.5px solid #ede4d9;
  }

  .card-back {
    background: linear-gradient(145deg, #FFF5E8, #FDE8CC);
    border: 1.5px solid #f0d5b0;
    transform: rotateY(180deg);
  }

  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .card-number {
    position: absolute;
    top: 16px;
    left: 20px;
    font-size: 0.72rem;
    color: #c8b8a8;
    font-weight: 500;
  }

  .card-tap-hint {
    position: absolute;
    bottom: 16px;
    right: 18px;
    font-size: 0.68rem;
    color: #c8b8a8;
  }

  .main-word {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 6vw, 2.8rem);
    color: var(--ink);
    text-align: center;
    line-height: 1.1;
  }

  .card-front .main-word { font-style: italic; }

  .translation {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 4vw, 2rem);
    color: var(--terra);
    margin-bottom: 10px;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 20px;
    margin-top: 14px;
    width: 100%;
    max-width: 300px;
  }

  .meta-item { text-align: center; }
  .meta-label { font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .meta-value { font-size: 0.9rem; font-weight: 600; color: var(--ink); margin-top: 1px; }
  .meta-value.irreg { color: var(--terra); }

  .aux-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 99px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: 10px;
  }

  .aux-essere { background: #E8F5EE; color: var(--green); }
  .aux-avere { background: #FEF3E8; color: var(--terra); }
  .aux-both { background: #F0EEF8; color: #5B4F9E; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 20px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 11px 22px;
    border-radius: 12px;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }

  .btn:active { transform: scale(0.96); }

  .btn-wrong {
    background: #FDECEA;
    color: var(--red);
    border: 1.5px solid #f5c6c2;
  }

  .btn-right {
    background: #E9F7EF;
    color: var(--green);
    border: 1.5px solid #a8dbbe;
  }

  .btn-skip {
    background: #F3F0EC;
    color: var(--muted);
    border: 1.5px solid #ddd6ce;
  }

  .btn-wrong:hover { background: #fad4d0; }
  .btn-right:hover { background: #c8edda; }
  .btn-skip:hover { background: #e8e2dc; }

  /* Score row */
  .score-row {
    display: flex;
    gap: 20px;
    font-size: 0.82rem;
    color: var(--muted);
  }

  .score-item { display: flex; align-items: center; gap: 6px; }
  .score-dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-right { background: var(--green); }
  .dot-wrong { background: var(--red); }

  /* Shuffle & restart */
  .controls-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn-ctrl {
    padding: 8px 18px;
    border-radius: 99px;
    border: 1.5px solid #d4c9bc;
    background: transparent;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }

  .btn-ctrl:hover { border-color: var(--sun); color: var(--terra); }

  /* Done screen */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
  }

  .done-screen.visible { display: flex; }

  .done-emoji { font-size: 3rem; margin-bottom: 12px; }
  .done-title { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--ink); }
  .done-sub { font-size: 0.9rem; color: var(--muted); margin-top: 8px; }
  .done-stats { display: flex; gap: 24px; margin-top: 20px; }
  .done-stat { text-align: center; }
  .done-stat-num { font-size: 1.8rem; font-weight: 700; }
  .done-stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .num-green { color: var(--green); }
  .num-red { color: var(--red); }

  @media (max-width: 420px) {
    .scene { height: 250px; }
    .btn { padding: 10px 16px; font-size: 0.82rem; }
  }

  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>
<body>

<header>
  <h1>İtalyanca <span>Fiiller</span></h1>
  <p class="subtitle">Kartı çevirmek için dokunun &nbsp;·&nbsp; 99 fiil</p>
</header>

<div class="progress-row">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 99</div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
  <button class="filter-btn" onclick="setFilter('essere', this)">essere</button>
  <button class="filter-btn" onclick="setFilter('avere', this)">avere</button>
  <button class="filter-btn" onclick="setFilter('irregular', this)">Düzensiz</button>
  <button class="filter-btn" onclick="setFilter('wrong', this)">Yanlışlar</button>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <span class="card-number" id="cardNumber">#1</span>
      <span class="card-label">İtalyanca</span>
      <div class="main-word" id="frontWord">—</div>
      <span class="card-tap-hint">çevir →</span>
    </div>
    <div class="card-face card-back">
      <span class="card-number" id="cardNumberBack">#1</span>
      <span class="card-label">Türkçe / İngilizce</span>
      <div class="translation" id="backTranslation">—</div>
      <div class="meta-grid">
        <div class="meta-item">
          <div class="meta-label">Presente</div>
          <div class="meta-value" id="backPresente">—</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Participio</div>
          <div class="meta-value" id="backParticipio">—</div>
        </div>
      </div>
      <div class="aux-badge" id="auxBadge">—</div>
    </div>
  </div>
</div>

<div class="btn-row" id="btnRow">
  <button class="btn btn-wrong" onclick="markWrong()">✗ Bilmedim</button>
  <button class="btn btn-skip" onclick="nextCard()">→ Atla</button>
  <button class="btn btn-right" onclick="markRight()">✓ Bildim</button>
</div>

<div class="score-row">
  <div class="score-item"><div class="score-dot dot-right"></div><span id="rightCount">0 doğru</span></div>
  <div class="score-item"><div class="score-dot dot-wrong"></div><span id="wrongCount">0 yanlış</span></div>
</div>

<div class="controls-row">
  <button class="btn-ctrl" onclick="shuffleDeck()">⇄ Karıştır</button>
  <button class="btn-ctrl" onclick="restartDeck()">↺ Başa dön</button>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-emoji">🎉</div>
  <div class="done-title">Tur tamamlandı!</div>
  <div class="done-sub">Tüm kartları geçtiniz.</div>
  <div class="done-stats">
    <div class="done-stat"><div class="done-stat-num num-green" id="finalRight">0</div><div class="done-stat-label">Doğru</div></div>
    <div class="done-stat"><div class="done-stat-num num-red" id="finalWrong">0</div><div class="done-stat-label">Yanlış</div></div>
  </div>
  <div class="controls-row" style="margin-top:20px">
    <button class="btn-ctrl" onclick="restartDeck()">↺ Tekrar başla</button>
    <button class="btn-ctrl" onclick="reviewWrong()">✗ Yanlışları tekrar et</button>
  </div>
</div>

  {n:87, it:"seguire", en:"takip etmek", pres:"seguo", part:"seguito", aux:"avere", irr:false},
  {n:88, it:"viaggiare", en:"seyahat etmek", pres:"viaggio", part:"viaggiato", aux:"avere", irr:false},
  {n:89, it:"ricordare", en:"hatırlamak", pres:"ricordo", part:"ricordato", aux:"avere", irr:false},
  {n:90, it:"tradurre", en:"çevirmek", pres:"traduco", part:"tradotto*", aux:"avere", irr:true},
  {n:91, it:"telefonare", en:"telefon etmek", pres:"telefono", part:"telefonato", aux:"avere", irr:false},
  {n:92, it:"preparare", en:"hazırlamak", pres:"preparo", part:"preparato", aux:"avere", irr:false},
  {n:93, it:"aiutare", en:"yardım etmek", pres:"aiuto", part:"aiutato", aux:"avere", irr:false},
  {n:94, it:"mancare", en:"özlemek / eksik olmak", pres:"manco", part:"mancato", aux:"avere", irr:false},
  {n:95, it:"ridere", en:"gülmek", pres:"rido", part:"riso*", aux:"avere", irr:false},
  {n:96, it:"piangere", en:"ağlamak", pres:"piango", part:"pianto*", aux:"avere", irr:false},
  {n:97, it:"visitare", en:"ziyaret etmek", pres:"visito", part:"visitato", aux:"avere", irr:false},
  {n:98, it:"accendere", en:"yakmak / açmak", pres:"accendo", part:"acceso*", aux:"avere", irr:false},
  {n:99, it:"spegnere", en:"söndürmek / kapatmak", pres:"spengo*", part:"spento*", aux:"avere", irr:true},
];

let deck = [...VERBS];
let currentIndex = 0;
let isFlipped = false;
let rightScore = 0;
let wrongScore = 0;
let wrongIds = new Set();
let currentFilter = 'all';

function getFilteredDeck() {
  if (currentFilter === 'all') return [...VERBS];
  if (currentFilter === 'essere') return VERBS.filter(v => v.aux === 'essere');
  if (currentFilter === 'avere') return VERBS.filter(v => v.aux === 'avere');
  if (currentFilter === 'irregular') return VERBS.filter(v => v.irr);
  if (currentFilter === 'wrong') return VERBS.filter(v => wrongIds.has(v.n));
  return [...VERBS];
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  deck = getFilteredDeck();
  if (deck.length === 0) {
    if (f === 'wrong') {
      deck = [...VERBS];
      currentFilter = 'all';
      document.querySelectorAll('.filter-btn')[0].classList.add('active');
    }
  }
  currentIndex = 0; rightScore = 0; wrongScore = 0;
  updateScores();
  showCard();
}

function showCard() {
  const doneScreen = document.getElementById('doneScreen');
  const scene = document.getElementById('scene');
  const btnRow = document.getElementById('btnRow');

  if (currentIndex >= deck.length) {
    doneScreen.classList.add('visible');
    scene.style.display = 'none';
    btnRow.style.display = 'none';
    document.getElementById('finalRight').textContent = rightScore;
    document.getElementById('finalWrong').textContent = wrongScore;
    return;
  }

  doneScreen.classList.remove('visible');
  scene.style.display = '';
  btnRow.style.display = '';

  const v = deck[currentIndex];
  document.getElementById('cardNumber').textContent = '#' + v.n;
  document.getElementById('cardNumberBack').textContent = '#' + v.n;
  document.getElementById('frontWord').textContent = v.it;
  document.getElementById('backTranslation').textContent = v.en;
  document.getElementById('backPresente').textContent = v.pres;
  document.getElementById('backPresente').className = 'meta-value' + (v.pres.includes('*') ? ' irreg' : '');
  document.getElementById('backParticipio').textContent = v.part;
  document.getElementById('backParticipio').className = 'meta-value' + (v.part.includes('*') ? ' irreg' : '');

  const badge = document.getElementById('auxBadge');
  if (v.aux === 'essere') { badge.textContent = 'aux: essere'; badge.className = 'aux-badge aux-essere'; }
  else if (v.aux === 'avere') { badge.textContent = 'aux: avere'; badge.className = 'aux-badge aux-avere'; }
  else { badge.textContent = 'aux: a/e'; badge.className = 'aux-badge aux-both'; }

  // Reset flip
  isFlipped = false;
  document.getElementById('card').classList.remove('flipped');

  // Progress
  const pct = (currentIndex / deck.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = currentIndex + ' / ' + deck.length;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function markRight() {
  rightScore++;
  updateScores();
  nextCard();
}

function markWrong() {
  wrongScore++;
  wrongIds.add(deck[currentIndex].n);
  updateScores();
  nextCard();
}

function nextCard() {
  currentIndex++;
  showCard();
}

function updateScores() {
  document.getElementById('rightCount').textContent = rightScore + ' doğru';
  document.getElementById('wrongCount').textContent = wrongScore + ' yanlış';
}

function shuffleDeck() {
  deck = getFilteredDeck();
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  currentIndex = 0; rightScore = 0; wrongScore = 0;
  updateScores();
  showCard();
}

function restartDeck() {
  deck = getFilteredDeck();
  currentIndex = 0; rightScore = 0; wrongScore = 0;
  updateScores();
  showCard();
}

function reviewWrong() {
  currentFilter = 'wrong';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===4));
  deck = getFilteredDeck();
  if (deck.length === 0) { restartDeck(); return; }
  currentIndex = 0; rightScore = 0; wrongScore = 0;
  updateScores();
  showCard();
}

// Init
showCard();
</script>
</body>
</html>
